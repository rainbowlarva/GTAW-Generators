<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Interview Card Generator</title>
    <link rel="stylesheet" href="fi-card.css"> <!-- Link to CSS -->
</head>
<body class="background">
    <div class="container">
        <h1>Field Interview Card Generator</h1>

        <a href="https://rainbowlarva.github.io/GTAW-Generators/">
            <img src="../arrow.png" alt="Back" class="back-button">
        </a>

        <!-- User Input Form -->
        <form id="ficForm">
            <h2>Subject Information</h2>
            <div>
                <label for="name">Name (First, Middle, Last):</label>
                <input type="text" id="name" name="name" placeholder="Enter name">
            </div>
            <div>
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" placeholder="Enter phone number">
            </div>
            <div>
                <label for="sex">Sex (M/F/O):</label>
                <input type="text" id="sex" name="sex" placeholder="M / F / O">
            </div>
            <div>
                <label for="hair">Hair:</label>
                <input type="text" id="hair" name="hair" placeholder="Enter hair color">
            </div>
            <div>
                <label for="eyes">Eyes:</label>
                <input type="text" id="eyes" name="eyes" placeholder="Enter eye color">
            </div>

            <h2>Address & Physical Description</h2>
            <div>
                <label for="residence">Residence:</label>
                <input type="text" id="residence" name="residence" placeholder="Enter residence">
            </div>
            <div>
                <label for="birthdate">Birthdate:</label>
                <input type="text" id="birthdate" name="birthdate" placeholder="Enter birthdate">
            </div>
            <div>
                <label for="descent">Descent:</label>
                <input type="text" id="descent" name="descent" placeholder="Enter descent">
            </div>
            <div>
                <label for="height">Height:</label>
                <input type="text" id="height" name="height" placeholder="Enter height">
            </div>
            
            <h2>Additional Details</h2>
            <div>
                <label for="oddities">Personal Oddities:</label>
                <input type="text" id="oddities" name="oddities" placeholder="Enter any personal oddities">
            </div>
            <div>
                <label for="moniker">Moniker / Alias:</label>
                <input type="text" id="moniker" name="moniker" placeholder="Enter moniker/alias">
            </div>
            <div>
                <label for="gang">Gang / Club:</label>
                <input type="text" id="gang" name="gang" placeholder="Enter gang or club">
            </div>

            <h2>Subject Information</h2>
            <div class="checkbox-group">
                <div class="checkbox-container"><input type="checkbox" id="loiterer"><label for="loiterer">Loiterer</label></div>
                <div class="checkbox-container"><input type="checkbox" id="prowler"><label for="prowler">Prowler</label></div>
                <div class="checkbox-container"><input type="checkbox" id="homeless"><label for="homeless">Homeless</label></div>
                <div class="checkbox-container"><input type="checkbox" id="witness"><label for="witness">Witness</label></div>
                <div class="checkbox-container"><input type="checkbox" id="gangActivity"><label for="gangActivity">Gang Activity</label></div>
                <div class="checkbox-container"><input type="checkbox" id="hasRecord"><label for="hasRecord">Has Record</label></div>
                <div class="checkbox-container"><input type="checkbox" id="onParole"><label for="onParole">On Parole</label></div>
                <div class="checkbox-container"><input type="checkbox" id="onProbation"><label for="onProbation">On Probation</label></div>
                <div class="checkbox-container"><input type="checkbox" id="driver"><label for="driver">Driver</label></div>
                <div class="checkbox-container"><input type="checkbox" id="passenger"><label for="passenger">Passenger</label></div>
            </div>

            <h2>Vehicle Information</h2>
            <div class="checkbox-group">
                <div class="checkbox-container"><input type="checkbox" id="bucketSeat"><label for="bucketSeat">Bucket Seat</label></div>
                <div class="checkbox-container"><input type="checkbox" id="damagedInside"><label for="damagedInside">Damaged Inside</label></div>
                <div class="checkbox-container"><input type="checkbox" id="customWheels"><label for="customWheels">Custom Wheels</label></div>
                <div class="checkbox-container"><input type="checkbox" id="paintedMural"><label for="paintedMural">Painted Mural</label></div>
                <div class="checkbox-container"><input type="checkbox" id="levelAlter"><label for="levelAlter">Level Altered</label></div>
                <div class="checkbox-container"><input type="checkbox" id="rustPrimer"><label for="rustPrimer">Rust/Primer</label></div>
                <div class="checkbox-container"><input type="checkbox" id="customPaint"><label for="customPaint">Custom Paint</label></div>
                <div class="checkbox-container"><input type="checkbox" id="vinylTop"><label for="vinylTop">Vinyl Top</label></div>
            </div>

            <h2>Additional Info</h2>
            <div>
                <label for="additionalInfo">Additional Info / Narrative:</label>
                <textarea id="additionalInfo" name="additionalInfo" placeholder="Enter additional information"></textarea>
            </div>

            <h2>Officer Details</h2>
            <div>
                <label for="officer">Officer Name:</label>
                <input type="text" id="officer" name="officer" placeholder="Enter officer name">
            </div>
            <div>
                <label for="serialNumber">Serial Number:</label>
                <input type="text" id="serialNumber" name="serialNumber" placeholder="Enter serial number">
            </div>
            <div>
                <label for="callsign">Callsign:</label>
                <input type="text" id="callsign" name="callsign" placeholder="Enter callsign">
            </div>
            <div>
                <label for="incidentNumber">Incident Number:</label>
                <input type="text" id="incidentNumber" name="incidentNumber" placeholder="Enter incident number">
            </div>
            <div>
                <label for="division">Division:</label>
                <input type="text" id="division" name="division" placeholder="Enter division">
            </div>
            <div>
                <label for="detail">Detail:</label>
                <input type="text" id="detail" name="detail" placeholder="Enter detail">
            </div>
            <div>
                <label for="supvInit">Supv. Init.:</label>
                <input type="text" id="supvInit" name="supvInit" placeholder="Enter supervisor initiation">
            </div>

            <button type="submit">Generate BBCode</button>
        </form>

        <!-- Output Area -->
        <div id="bbcodeOutput">
            <h2>Generated BBCode:</h2>
            <pre id="bbcodeText"></pre>
        </div>
    </div>

    <script src="fi-card.js"></script> <!-- Link to JavaScript file -->
</body>
</html>
