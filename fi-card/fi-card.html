<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Interview Card Generator</title>
    <link rel="stylesheet" href="ficard.css"> <!-- Link to your CSS file -->
</head>
<body class="background">
    <div class="container">
        <h1>Field Interview Card Generator</h1>
        
        <a href="https://rainbowlarva.github.io/GTAW-Generators/">
            <img src="../arrow.png" alt="Back" class="back-button">
        </a>

        <!-- User Input Form -->
        <form id="ficardForm">
            <h2>Basic Information</h2>
            <div>
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter full name">
            </div>
            <div>
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" placeholder="Enter phone number">
            </div>
            <div>
                <label for="sex">Sex (M/F/O):</label>
                <input type="text" id="sex" name="sex" placeholder="Enter sex">
            </div>
            <div>
                <label for="hair">Hair Color:</label>
                <input type="text" id="hair" name="hair" placeholder="Enter hair color">
            </div>
            <div>
                <label for="eyes">Eye Color:</label>
                <input type="text" id="eyes" name="eyes" placeholder="Enter eye color">
            </div>

            <h2>Residence & Description</h2>
            <div>
                <label for="residence">Residence:</label>
                <input type="text" id="residence" name="residence" placeholder="Enter residence">
            </div>
            <div>
                <label for="birthdate">Birthdate:</label>
                <input type="text" id="birthdate" name="birthdate" placeholder="Enter birthdate">
            </div>
            <div>
                <label for="descent">Descent:</label>
                <input type="text" id="descent" name="descent" placeholder="Enter descent">
            </div>
            <div>
                <label for="height">Height:</label>
                <input type="text" id="height" name="height" placeholder="Enter height">
            </div>

            <h2>Checkboxes - Subject Info</h2>
            <div class="checkbox-group">
                <label><input type="checkbox" id="loiterer"> Loiterer</label>
                <label><input type="checkbox" id="prowler"> Prowler</label>
                <label><input type="checkbox" id="homeless"> Homeless</label>
                <label><input type="checkbox" id="witness"> Witness</label>
                <label><input type="checkbox" id="gangActivity"> Gang Activity</label>
                <label><input type="checkbox" id="hasRecord"> Has Record</label>
                <label><input type="checkbox" id="onParole"> On Parole</label>
                <label><input type="checkbox" id="onProbation"> On Probation</label>
                <label><input type="checkbox" id="driver"> Driver</label>
                <label><input type="checkbox" id="passenger"> Passenger</label>
            </div>

            <h2>Additional Information</h2>
            <div>
                <label for="additionalInfo">Additional Information / Narrative:</label>
                <textarea id="additionalInfo" name="additionalInfo" placeholder="Enter additional details"></textarea>
            </div>

            <button type="submit">Generate BBCode</button>
        </form>

        <!-- Output Area -->
        <div id="bbcodeOutput">
            <h2>Generated BBCode:</h2>
            <pre id="bbcodeText"></pre>
        </div>
    </div>

    <script src="ficard.js"></script> <!-- Link to JavaScript file -->
</body>
</html>
